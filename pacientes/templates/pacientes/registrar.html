{% extends 'core_app/base.html' %}

{% block title %}Registrar Paciente{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h1 style="margin-bottom: 20px;">➕ Registrar Nuevo Paciente</h1>
    
    <div class="card">
        <form method="post">
            {% csrf_token %}
            
            <h3>Datos Personales</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div>
                    <label>Nombre *</label>
                    <input type="text" name="nombre" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label>Apellido *</label>
                    <input type="text" name="apellido" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label>DNI *</label>
                    <input type="text" name="dni" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label>Fecha de Nacimiento *</label>
                    <input type="date" name="fecha_nacimiento" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label>Teléfono *</label>
                    <input type="text" name="telefono" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label>Email</label>
                    <input type="email" name="email" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label>Dirección</label>
                <input type="text" name="direccion" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            
            <h3>🏥 Obra Social</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div>
                    <label>Obra Social</label>
                    <select name="obra_social" id="select-obra-social" onchange="cargarPlanes(this.value)"
                            style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="">Particular</option>
                        {% for os in obras_sociales %}
                            <option value="{{ os.id }}">{{ os.nombre }} ({{ os.sigla }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label>Plan</label>
                    <select name="plan_obra_social" id="select-plan" disabled
                            style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="">Primero seleccioná una obra social</option>
                    </select>
                </div>
                <div>
                    <label>N° Afiliado</label>
                    <input type="text" name="numero_afiliado" 
                        style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
            </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div>
                        <label>Sesiones Autorizadas</label>
                        <input type="number" name="sesiones_autorizadas" min="0" 
                            style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;"
                            placeholder="Ej: 20">
                    </div>
                    <div>
                        <label>Sesiones Restantes</label>
                        <input type="number" name="sesiones_restantes" min="0" 
                            style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;"
                            placeholder="Ej: 20">
                    </div>
                    <div>
                        <label>Vencimiento</label>
                        <input type="date" name="fecha_vencimiento" 
                            style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn btn-success" style="width: 100%; padding: 12px;">
                Registrar Paciente
            </button>
        </form>
    </div>
</div>

<script>
// Cargar planes según la obra social seleccionada
const planesPorOS = {};
{% for os in obras_sociales %}
    planesPorOS[{{ os.id }}] = [
        {% for plan in os.planes.all %}
            {id: {{ plan.id }}, nombre: "{{ plan.nombre|escapejs }}"},
        {% endfor %}
    ];
{% endfor %}

function cargarPlanes(obraSocialId) {
    const selectPlan = document.getElementById('select-plan');
    selectPlan.innerHTML = '<option value="">Sin plan</option>';
    selectPlan.disabled = true;
    
    if (obraSocialId && planesPorOS[obraSocialId]) {
        planesPorOS[obraSocialId].forEach(function(plan) {
            const option = document.createElement('option');
            option.value = plan.id;
            option.textContent = plan.nombre;
            selectPlan.appendChild(option);
        });
        selectPlan.disabled = false;
    }
}

// Cargar planes al iniciar si ya hay obra social seleccionada
document.addEventListener('DOMContentLoaded', function() {
    const selectOS = document.getElementById('select-obra-social');
    if (selectOS && selectOS.value) {
        cargarPlanes(selectOS.value);
        // Marcar plan seleccionado si existe
        {% if paciente and paciente.plan_obra_social %}
            const selectPlan = document.getElementById('select-plan');
            if (selectPlan) {
                selectPlan.value = "{{ paciente.plan_obra_social.id }}";
            }
        {% endif %}
    }
});
</script>
{% endblock %}
