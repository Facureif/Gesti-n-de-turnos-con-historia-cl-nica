{% extends 'core_app/base.html' %}
{% load static %}

{% block title %}Cambiar Contraseña{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/pages/portal_paciente.css' %}">
{% endblock %}

{% block content %}
<div class="portal-paciente-page">
<div class="portal-paciente-container-xs">

    <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 4px;">🔒 Cambiar Contraseña</h1>
    <p style="color: var(--text-muted); margin-bottom: 20px;">Por seguridad, cambiá la contraseña que te asignaron.</p>

    <div class="portal-card">
        <form method="POST">
            {% csrf_token %}
            
            <label class="portal-form-label">Contraseña Actual</label>
            <input type="password" name="old_password" class="portal-form-input" required>
            
            <label class="portal-form-label">Nueva Contraseña</label>
            <input type="password" name="new_password1" class="portal-form-input" required>
            
            <label class="portal-form-label">Confirmar Nueva Contraseña</label>
            <input type="password" name="new_password2" class="portal-form-input" required>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">Cambiar Contraseña</button>
        </form>
    </div>
    
    <a href="{% url 'panel_paciente' %}" style="display: block; text-align: center; margin-top: 16px; color: var(--text-muted);">← Volver</a>

</div>
</div>
{% endblock %}
