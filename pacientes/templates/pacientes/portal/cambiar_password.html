{% extends 'core_app/base.html' %}

{% block title %}Cambiar Contraseña{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 0 auto;">
    <h1>🔒 Cambiar Contraseña</h1>
    <p style="color: #666; margin-bottom: 20px;">Por seguridad, cambiá la contraseña que te asignaron.</p>

    <div class="card">
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group" style="margin-bottom: 16px;">
                <label>Contraseña Actual</label>
                <input type="password" name="old_password" class="form-control" required>
            </div>
            <div class="form-group" style="margin-bottom: 16px;">
                <label>Nueva Contraseña</label>
                <input type="password" name="new_password1" class="form-control" required>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label>Confirmar Nueva Contraseña</label>
                <input type="password" name="new_password2" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Cambiar Contraseña</button>
        </form>
    </div>
    
    <a href="{% url 'panel_paciente' %}" style="display: block; text-align: center; margin-top: 16px;">← Volver</a>
</div>
{% endblock %}
