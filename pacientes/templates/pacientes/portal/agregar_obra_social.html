{% extends 'core_app/base.html' %}
{% load static %}

{% block title %}Agregar Obra Social{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/pages/portal_paciente.css' %}">
{% endblock %}

{% block content %}
<div class="portal-paciente-page">
<div class="portal-paciente-container-sm">

    <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 20px;">➕ Agregar Obra Social</h1>
    
    <form method="post" class="portal-card">
        {% csrf_token %}
        
        <label class="portal-form-label">Obra Social *</label>
        <select name="obra_social" id="obra_social_select" required class="portal-form-select">
            <option value="">Seleccionar...</option>
            {% for os in obras_sociales %}
            <option value="{{ os.id }}" data-planes='[{% for plan in os.planes.all %}{"id":{{ plan.id }},"nombre":"{{ plan.nombre }}"}{% if not forloop.last %},{% endif %}{% endfor %}]'>
                {{ os.nombre }}
            </option>
            {% endfor %}
        </select>
        
        <label class="portal-form-label">Plan</label>
        <select name="plan" id="plan_select" class="portal-form-select" style="display: none;">
            <option value="">Seleccionar plan...</option>
        </select>
        
        <label class="portal-form-label">N° de Afiliado</label>
        <input type="text" name="numero_afiliado" placeholder="N° de afiliado" class="portal-form-input">
        
        <label class="portal-form-checkbox">
            <input type="checkbox" name="activa" checked>
            <span>¿Está activa?</span>
        </label>
        
        <div class="portal-form-botones">
            <button type="submit" class="btn btn-success">✅ Guardar</button>
            <a href="{% url 'mis_obras_sociales' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>

</div>
</div>

<script>
document.getElementById('obra_social_select').addEventListener('change', function() {
    var planSelect = document.getElementById('plan_select');
    var selectedOption = this.options[this.selectedIndex];
    
    if (!this.value) {
        planSelect.style.display = 'none';
        planSelect.innerHTML = '<option value="">Seleccionar plan...</option>';
        return;
    }
    
    var planesData = selectedOption.getAttribute('data-planes');
    if (planesData) {
        var planes = JSON.parse(planesData);
        planSelect.innerHTML = '<option value="">Seleccionar plan...</option>';
        planes.forEach(function(plan) {
            planSelect.innerHTML += '<option value="' + plan.id + '">' + plan.nombre + '</option>';
        });
        planSelect.style.display = 'block';
    } else {
        planSelect.style.display = 'none';
    }
});
</script>
{% endblock %}
